<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuvo — מערכת ניהול</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060402;
      --gold: #c9a227;
      --gold-rgb: 201,162,39;
      --card-bg: rgba(10,7,4,.92);
    }

    html, body {
      height: 100%;
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: #fff;
      overflow-x: hidden;
    }

    /* ===== BACKGROUND ORB ===== */
    .orb {
      position: fixed;
      bottom: -280px;
      left: -200px;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(180,130,20,.12) 0%, transparent 70%);
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      animation: orbBreathe 9s ease-in-out infinite;
    }
    @keyframes orbBreathe {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.1); opacity: .75; }
    }

    /* ===== BACKGROUND WATERMARK ===== */
    .watermark {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Heebo', sans-serif;
      font-size: 260px;
      font-weight: 900;
      color: rgba(255,255,255,.018);
      letter-spacing: -10px;
      pointer-events: none;
      z-index: 0;
      user-select: none;
      white-space: nowrap;
    }

    /* ===== STARS ===== */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: starTwinkle var(--d,4s) ease-in-out var(--dl,0s) infinite;
    }
    @keyframes starTwinkle {
      0%, 100% { opacity: var(--min-op, .04); }
      50%       { opacity: var(--max-op, .18); }
    }

    /* ===== CURSOR SPOTLIGHT ===== */
    .cursor-light {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(
        circle 380px at var(--cx, 50%) var(--cy, 50%),
        rgba(201,162,39,.04) 0%,
        transparent 70%
      );
    }

    /* ===== PAGE LAYOUT ===== */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 24px;
    }

    /* ===== CARD ===== */
    .card {
      background: rgba(10,7,4,.92);
      border: 1px solid rgba(201,162,39,.32);
      border-radius: 22px;
      padding: 44px 44px 36px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(24px);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: cardIn .9s cubic-bezier(.22,1,.36,1) both, goldBreath 6s ease-in-out 1s infinite, cardFloat 8s ease-in-out 1.5s infinite;
      box-shadow:
        0 0 0 1px rgba(201,162,39,.10),
        0 0 18px  rgba(201,162,39,.13),
        0 0 48px  rgba(201,162,39,.08),
        0 0 100px rgba(201,162,39,.05),
        0 30px 90px rgba(0,0,0,.65),
        inset 0 1px 0 rgba(201,162,39,.18);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes goldBreath {
      0%,100% {
        box-shadow:
          0 0 0 1px rgba(201,162,39,.10),
          0 0 18px  rgba(201,162,39,.13),
          0 0 48px  rgba(201,162,39,.08),
          0 0 100px rgba(201,162,39,.05),
          0 30px 90px rgba(0,0,0,.65),
          inset 0 1px 0 rgba(201,162,39,.18);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(201,162,39,.22),
          0 0 22px  rgba(201,162,39,.22),
          0 0 60px  rgba(201,162,39,.13),
          0 0 130px rgba(201,162,39,.08),
          0 30px 90px rgba(0,0,0,.65),
          inset 0 1px 0 rgba(201,162,39,.26);
      }
    }
    @keyframes cardFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    /* Subtle scanlines on card */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.03) 2px,
        rgba(0,0,0,.03) 4px
      );
      border-radius: 22px;
      z-index: 1;
    }

    /* ===== STAGGERED ENTRANCE ===== */
    .card > * {
      opacity: 0;
      animation: fadeSlideUp .55s cubic-bezier(.22,1,.36,1) both;
      position: relative;
      z-index: 2;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card > *:nth-child(1) { animation-delay: .40s; }
    .card > *:nth-child(2) { animation-delay: .50s; }
    .card > *:nth-child(3) { animation-delay: .57s; }
    .card > *:nth-child(4) { animation-delay: .63s; }
    .card > *:nth-child(5) { animation-delay: .69s; }
    .card > *:nth-child(6) { animation-delay: .75s; }
    .card > *:nth-child(7) { animation-delay: .81s; }
    .card > *:nth-child(8) { animation-delay: .87s; }
    .card > *:nth-child(9) { animation-delay: .93s; }

    /* ===== GREETING ===== */
    .greeting {
      font-size: .72rem;
      color: rgba(201,162,39,.55);
      letter-spacing: 2px;
      margin-bottom: 18px;
      font-weight: 400;
    }

    /* ===== LOGO AREA ===== */
    .logo-area {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 18px;
    }
    .logo-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 160px;
      height: 80px;
      background: radial-gradient(ellipse, rgba(201,162,39,.14) 0%, transparent 70%);
      pointer-events: none;
      animation: logoGlowBreath 5s ease-in-out infinite;
    }
    @keyframes logoGlowBreath {
      0%, 100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: .6; transform: translate(-50%,-50%) scale(1.12); }
    }
    .logo-frame {
      position: relative;
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(201,162,39,.35);
      border-radius: 14px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 16px rgba(0,0,0,.35);
    }
    .logo-frame img {
      height: 62px;
      max-width: 180px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 2px 12px rgba(0,0,0,.4));
    }
    .logo-fallback {
      font-size: 1.8rem;
      font-weight: 900;
      color: rgba(201,162,39,.9);
      letter-spacing: 1px;
    }

    /* ===== LIVE BADGE ===== */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(201,162,39,.06);
      border: 1px solid rgba(201,162,39,.18);
      border-radius: 100px;
      padding: 4px 14px 4px 10px;
      font-size: .78rem;
      font-weight: 700;
      color: rgba(201,162,39,.6);
      margin-bottom: 20px;
      letter-spacing: .5px;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px rgba(201,162,39,.8);
      flex-shrink: 0;
      animation: livePulse 2s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(.7); }
    }

    /* ===== TAGLINE ===== */
    .tagline {
      font-size: .68rem;
      font-weight: 700;
      color: rgba(201,162,39,.55);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
      text-align: center;
    }

    /* ===== TITLE ===== */
    h1.title {
      font-size: 2.3rem;
      font-weight: 800;
      color: #fff;
      text-align: center;
      line-height: 1.15;
      margin-bottom: 10px;
      text-shadow: 0 2px 20px rgba(0,0,0,.5);
    }

    /* ===== DIVIDER ===== */
    .divider {
      width: 50px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(201,162,39,.4), transparent);
      border-radius: 4px;
      margin: 0 auto 14px;
    }

    /* ===== SUBTITLE / TYPEWRITER ===== */
    .sub {
      font-size: .95rem;
      font-weight: 300;
      color: rgba(255,255,255,.38);
      text-align: center;
      min-height: 1.5em;
      margin-bottom: 30px;
      letter-spacing: .3px;
    }
    .sub .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: rgba(201,162,39,.6);
      vertical-align: middle;
      margin-right: 1px;
      animation: blinkCursor .7s step-end infinite;
    }
    @keyframes blinkCursor {
      0%, 100% { opacity: 1; } 50% { opacity: 0; }
    }

    /* ===== ACTIONS ===== */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      margin-bottom: 26px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: transform .15s, box-shadow .15s, opacity .15s, background .15s;
      position: relative;
      overflow: hidden;
      text-decoration: none;
    }
    .btn:active { transform: scale(.97); }

    /* Primary: gold gradient */
    .btn-primary {
      background: linear-gradient(135deg, #c9a227 0%, #8b6914 100%);
      color: #0a0602;
      font-weight: 800;
      box-shadow: 0 4px 20px rgba(201,162,39,.2);
    }
    .btn-primary:hover {
      box-shadow: 0 8px 28px rgba(201,162,39,.35);
      transform: translateY(-1px);
      filter: brightness(1.06);
    }
    /* Shimmer sweep */
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,.18) 50%, transparent 70%);
      transform: translateX(-120%);
      transition: transform .5s;
    }
    .btn-primary:hover::after { transform: translateX(120%); }

    .btn-outline {
      background: rgba(201,162,39,.07);
      color: rgba(201,162,39,.7);
      border: 1px solid rgba(201,162,39,.2);
    }
    .btn-outline:hover {
      background: rgba(201,162,39,.12);
      border-color: rgba(201,162,39,.35);
      transform: translateY(-1px);
    }

    /* ===== BOTTOM STRIP ===== */
    .bottom-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      width: 100%;
      border-top: 1px solid rgba(201,162,39,.1);
      padding-top: 18px;
    }
    .strip-sep {
      width: 1px;
      height: 14px;
      background: rgba(201,162,39,.15);
      flex-shrink: 0;
    }
    .strip-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .74rem;
      font-weight: 400;
      color: rgba(201,162,39,.3);
    }
    .strip-icon { font-size: .85rem; opacity: .65; }

    /* ===== FOOTER ===== */
    .footer {
      margin-top: 22px;
      font-size: .72rem;
      font-weight: 300;
      color: rgba(255,255,255,.16);
      text-align: center;
      letter-spacing: .3px;
      line-height: 1.6;
    }


    /* ===================================================
       MODALS  (white cards, light theme)
    =================================================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4,3,2,.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn .2s ease;
    }
    .modal-overlay.open { display: flex; }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .modal-card {
      background: #fff;
      border-radius: 18px;
      padding: 36px 32px 28px;
      width: 100%;
      max-width: 420px;
      color: #1a1a1a;
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
      animation: slideUp .25s ease;
      position: relative;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-close {
      position: absolute;
      top: 14px;
      left: 16px;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: #888;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background .15s, color .15s;
    }
    .modal-close:hover { background: #f0f0f0; color: #333; }

    .modal-title {
      font-size: 1.35rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 6px;
      text-align: center;
    }
    .modal-sub {
      font-size: .83rem;
      color: #64748b;
      text-align: center;
      margin-bottom: 22px;
    }

    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: .82rem;
      font-weight: 700;
      color: #374151;
      margin-bottom: 5px;
    }
    /* Login form — LTR override */
    #loginSection .form-group label { text-align: left; }
    #loginSection .form-group input {
      direction: ltr;
      text-align: left;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-family: 'Heebo', sans-serif;
      font-size: .92rem;
      color: #1a1a1a;
      background: #f8fafc;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
      direction: rtl;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #c9a227;
      box-shadow: 0 0 0 3px rgba(201,162,39,.12);
      background: #fff;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .modal-actions .btn { flex: 1; }

    /* Modal buttons override — gold in white modals */
    .modal-card .btn-primary {
      background: linear-gradient(135deg, #c9a227 0%, #8b6914 100%);
      color: #0a0602;
      border: none;
      box-shadow: 0 4px 16px rgba(201,162,39,.3);
      font-weight: 800;
    }
    .modal-card .btn-primary:hover {
      box-shadow: 0 6px 24px rgba(201,162,39,.45);
      filter: brightness(1.06);
    }
    .modal-card .btn-outline {
      background: #f1f5f9;
      color: #475569;
      border: 1.5px solid #e2e8f0;
    }
    .modal-card .btn-outline:hover {
      background: #e2e8f0;
      border-color: #cbd5e1;
    }

    .modal-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: .83rem;
      color: #dc2626;
      margin-bottom: 12px;
      display: none;
    }
    .modal-error.show { display: block; }

    .modal-success {
      background: #fefdf0;
      border: 1px solid #e6cc6a;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: .83rem;
      color: #7c5c0a;
      margin-bottom: 12px;
      display: none;
      text-align: center;
    }
    .modal-success.show { display: block; }

    /* change-password section inside login modal */
    #changePwSection { display: none; }

    .pw-toggle { position: relative; }
    .pw-toggle input { padding-left: 38px; }
    .pw-toggle .eye-btn {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: .95rem;
      padding: 2px;
    }
    .pw-toggle .eye-btn:hover { color: #475569; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(10,6,2,.3);
      border-top-color: #0a0602;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-left: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== LIVE CLOCK ===== */
    .clock-display {
      font-size: 2.1rem;
      font-weight: 900;
      color: rgba(201,162,39,.72);
      letter-spacing: 6px;
      margin-bottom: 2px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      direction: ltr;
      unicode-bidi: isolate;
    }
    .clock-sep {
      display: inline-block;
      animation: clockBlink 1s step-end infinite;
    }
    @keyframes clockBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .2; }
    }

    /* ===== SECURITY SCAN LINE ===== */
    .card-scan {
      position: absolute !important;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(201,162,39,.28) 40%, rgba(201,162,39,.48) 50%, rgba(201,162,39,.28) 60%, transparent 100%);
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      top: 0;
      animation: cardScan 7s ease-in-out 2.5s infinite !important;
    }
    @keyframes cardScan {
      0%   { top:   0%; opacity: 0; }
      6%   { opacity: 1; }
      94%  { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* extend stagger for child #10 */
    .card > *:nth-child(10) { animation-delay: .99s; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 520px) {
      .card { padding: 32px 20px 26px; }
      h1.title { font-size: 1.9rem; }
      .logo-frame img { height: 50px; }
      .bottom-strip { gap: 10px; }
      .strip-item { font-size: .68rem; }
      .strip-sep { display: none; }
      .modal-card { padding: 28px 20px 22px; }
      .watermark { font-size: 120px; }
    }
  </style>
</head>
<body>

<!-- Ambient orb -->
<div class="orb"></div>

<!-- Watermark -->
<div class="watermark">AFCON</div>

<!-- Stars -->
<div class="stars" id="starsContainer"></div>

<!-- Cursor spotlight -->
<div class="cursor-light" id="cursorLight"></div>

<!-- Main page -->
<div class="page">

  <div class="card" id="mainCard">

    <!-- Live clock -->
    <div class="clock-display" id="clockDisplay"></div>

    <!-- Greeting -->
    <div class="greeting" id="greeting"></div>

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-glow"></div>
      <div class="logo-frame">
        <img src="logo.png" alt="אפקון"
             onerror="this.style.display='none';document.getElementById('logo-fb').style.display='flex'">
        <div class="logo-fallback" id="logo-fb" style="display:none">אפקון</div>
      </div>
    </div>

    <!-- Live badge -->
    <div class="live-badge">
      <span class="live-dot"></span>מערכת פעילה
    </div>

    <!-- Tagline -->
    <div class="tagline">By RobXSystems</div>

    <!-- Title -->
    <h1 class="title">ברוכים הבאים</h1>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Typewriter subtitle -->
    <div class="sub" id="subText">
      <span id="twText"></span><span class="cursor-blink" id="twCursor"></span>
    </div>

    <!-- Action buttons -->
    <div class="actions">
      <button class="btn btn-primary" onclick="openLoginModal()">
        🔐 כניסה למערכת
      </button>
      <button class="btn btn-outline" onclick="openRequestModal()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3M13 5a2 2 0 1 0-4 0 2 2 0 0 0 4 0zM7 20a7 7 0 0 1 12 0"/></svg>
        בקשת גישה
      </button>
    </div>

    <!-- Bottom strip -->
    <div class="bottom-strip">
      <div class="strip-item"><span class="strip-icon">🔒</span> SSL</div>
      <div class="strip-sep"></div>
      <div class="strip-item"><span class="strip-icon">📡</span> 24/7 ניטור</div>
      <div class="strip-sep"></div>
      <div class="strip-item"><span class="strip-icon">🛡</span> גישה מאובטחת</div>
    </div>

    <!-- Security scan line (absolutely positioned, stagger overridden) -->
    <div class="card-scan" aria-hidden="true"></div>

  </div><!-- /card -->

  <div class="footer">
    כל הזכויות שמורות ל-Rob X Systems ואפקון בקרה ואוטומציה<br>
    <span style="opacity:.5">© 2024–2026</span>
  </div>

</div><!-- /page -->


<!-- ============================================================
     LOGIN MODAL
============================================================ -->
<div class="modal-overlay" id="loginModal" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
  <div class="modal-card">
    <button class="modal-close" onclick="closeLoginModal()" aria-label="סגור">✕</button>

    <!-- Login section -->
    <div id="loginSection">
      <div class="modal-title" id="loginTitle">Login</div>
      <div class="modal-sub">Enter your credentials</div>

      <div class="modal-error" id="loginError"></div>
      <div class="modal-success" id="loginSuccess"></div>

      <form onsubmit="doLogin(event)" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="loginUsername">Username</label>
          <input type="text" id="loginUsername" name="username" dir="ltr"
                 autocomplete="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="pw-toggle">
            <input type="password" id="loginPassword" name="password" dir="ltr"
                   autocomplete="current-password" placeholder="Enter password" required>
            <button type="button" class="eye-btn" onclick="togglePwLogin('loginPassword', this)" aria-label="Show/hide password">👁</button>
          </div>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary" id="loginSubmitBtn">Login</button>
          <button type="button" class="btn btn-outline" onclick="closeLoginModal()">Cancel</button>
        </div>
      </form>
    </div>

    <!-- Change password section (shown after first login with temp password) -->
    <div id="changePwSection">
      <div class="modal-title">עדכון סיסמה</div>
      <div class="modal-sub">נדרש להגדיר סיסמה חדשה לפני הכניסה</div>

      <div class="modal-error" id="changePwError"></div>
      <div class="modal-success" id="changePwSuccess"></div>

      <form onsubmit="doChangePassword(event)" autocomplete="off" novalidate>
        <input type="hidden" id="changePwUsername">
        <div class="form-group">
          <label for="changePwNew">סיסמה חדשה</label>
          <div class="pw-toggle">
            <input type="password" id="changePwNew" autocomplete="new-password"
                   placeholder="לפחות 8 תווים" required minlength="8">
            <button type="button" class="eye-btn" onclick="togglePwLogin('changePwNew', this)" aria-label="הצג/הסתר">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label for="changePwConfirm">אימות סיסמה חדשה</label>
          <div class="pw-toggle">
            <input type="password" id="changePwConfirm" autocomplete="new-password"
                   placeholder="הכנס שוב את הסיסמה החדשה" required>
            <button type="button" class="eye-btn" onclick="togglePwLogin('changePwConfirm', this)" aria-label="הצג/הסתר">👁</button>
          </div>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary" id="changePwSubmitBtn">שמור סיסמה</button>
        </div>
      </form>
    </div>

  </div>
</div>


<!-- ============================================================
     REQUEST ACCESS MODAL
============================================================ -->
<div class="modal-overlay" id="requestModal" role="dialog" aria-modal="true" aria-labelledby="requestTitle">
  <div class="modal-card">
    <button class="modal-close" onclick="closeRequestModal()" aria-label="סגור">✕</button>

    <div class="modal-title" id="requestTitle">בקשת גישה למערכת</div>
    <div class="modal-sub">מלא את הטופס ונחזור אליך בהקדם</div>

    <div class="modal-error" id="requestError"></div>
    <div class="modal-success" id="requestSuccess"></div>

    <form id="requestForm" onsubmit="submitRequest(event)" novalidate>
      <div class="form-group">
        <label for="reqName">שם מלא</label>
        <input type="text" id="reqName" placeholder="שם פרטי ושם משפחה" required>
      </div>
      <div class="form-group">
        <label for="reqEmail">כתובת אימייל</label>
        <input type="email" id="reqEmail" placeholder="name@company.com" required dir="ltr">
      </div>
      <div class="form-group">
        <label for="reqPhone">טלפון</label>
        <input type="tel" id="reqPhone" placeholder="05X-XXXXXXX" dir="ltr">
      </div>
      <div class="form-group">
        <label for="reqDivision">מחלקה</label>
        <input list="divisionList" id="reqDivision" placeholder="בחר או הקלד מחלקה" required>
        <datalist id="divisionList">
          <option value="בקרה ואוטומציה">
          <option value="CCTV ומצלמות">
          <option value="כיבוי אש">
          <option value="כניסה ובקרה">
          <option value="רשתות תקשורת">
          <option value="הנהלה">
          <option value="כספים">
          <option value="מנהלה">
        </datalist>
      </div>
      <div class="form-group">
        <label for="reqReason">סיבת הבקשה (אופציונלי)</label>
        <textarea id="reqReason" placeholder="תאר בקצרה מדוע את/ה זקוק/ה לגישה..."></textarea>
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary" id="requestSubmitBtn">שלח בקשה</button>
        <button type="button" class="btn btn-outline" onclick="closeRequestModal()">ביטול</button>
      </div>
    </form>

  </div>
</div>


<script>
  /* =========================================================
     ISRAEL TIME HELPER  (Asia/Jerusalem — handles DST automatically)
     Uses formatToParts() so hours/minutes are labelled by type,
     never depend on the locale's separator or field order.
  ========================================================= */
  function ilTime() {
    var parts = new Intl.DateTimeFormat('en-GB', {
      timeZone: 'Asia/Jerusalem',
      hour: '2-digit', minute: '2-digit', hour12: false
    }).formatToParts(new Date());
    var h = '', m = '';
    for (var i = 0; i < parts.length; i++) {
      if (parts[i].type === 'hour')   h = parts[i].value;
      if (parts[i].type === 'minute') m = parts[i].value;
    }
    return { h: parseInt(h, 10), hStr: h, mStr: m };
  }


  /* =========================================================
     TIME-OF-DAY GREETING
  ========================================================= */
  (function() {
    var h = ilTime().h;
    var g = h >= 5 && h < 12  ? '☀️ בוקר טוב'
           : h >= 12 && h < 17 ? '🌤 צהריים טובים'
           : h >= 17 && h < 21 ? '🌆 ערב טוב'
           : '🌙 לילה טוב';
    document.getElementById('greeting').textContent = g;
  })();


  /* =========================================================
     LIVE CLOCK
  ========================================================= */
  (function setupClock() {
    var el = document.getElementById('clockDisplay');
    function tick() {
      var t = ilTime();
      el.innerHTML = t.hStr + '<span class="clock-sep">:</span>' + t.mStr;
    }
    tick();
    setInterval(tick, 10000);
  })();


  /* =========================================================
     GENERATE STARS
  ========================================================= */
  (function generateStars() {
    var container = document.getElementById('starsContainer');
    var count = 35;
    for (var i = 0; i < count; i++) {
      var s = document.createElement('div');
      s.className = 'star';
      var size = Math.random() * 1.8 + 0.6;
      var x    = Math.random() * 100;
      var y    = Math.random() * 100;
      var dur  = (Math.random() * 5 + 3).toFixed(1) + 's';
      var del  = (Math.random() * 6).toFixed(1) + 's';
      var minO = (Math.random() * 0.04 + 0.01).toFixed(3);
      var maxO = (Math.random() * 0.14 + 0.06).toFixed(3);
      s.style.cssText = [
        'width:' + size + 'px',
        'height:' + size + 'px',
        'left:' + x + '%',
        'top:' + y + '%',
        '--d:' + dur,
        '--dl:' + del,
        '--min-op:' + minO,
        '--max-op:' + maxO
      ].join(';');
      container.appendChild(s);
    }
  })();


  /* =========================================================
     CURSOR SPOTLIGHT
  ========================================================= */
  (function setupCursorLight() {
    var el = document.getElementById('cursorLight');
    document.addEventListener('mousemove', function(e) {
      el.style.setProperty('--cx', e.clientX + 'px');
      el.style.setProperty('--cy', e.clientY + 'px');
    });
  })();


  /* =========================================================
     3D TILT ON CARD (activated after 900ms)
  ========================================================= */
  (function setupTilt() {
    var card = document.getElementById('mainCard');
    var enabled = false;

    setTimeout(function() { enabled = true; }, 900);

    document.addEventListener('mousemove', function(e) {
      if (!enabled) return;
      var rect = card.getBoundingClientRect();
      var cx   = rect.left + rect.width  / 2;
      var cy   = rect.top  + rect.height / 2;
      var dx   = (e.clientX - cx) / (rect.width  / 2);
      var dy   = (e.clientY - cy) / (rect.height / 2);
      var maxDeg = 4;
      var rx = (-dy * maxDeg).toFixed(2);
      var ry = ( dx * maxDeg).toFixed(2);
      card.style.transform = 'perspective(900px) rotateX(' + rx + 'deg) rotateY(' + ry + 'deg)';
    });

    document.addEventListener('mouseleave', function() {
      card.style.transform = '';   /* restore CSS cardFloat animation */
    });
  })();


  /* =========================================================
     TYPEWRITER
  ========================================================= */
  (function setupTypewriter() {
    var phrases = [
      'מערכת ניהול פרויקטים',
      'ניהול · בקרה · תיעוד',
      'פתרונות אבטחה מתקדמים'
    ];
    var el = document.getElementById('twText');
    var phraseIdx = 0;
    var charIdx = 0;
    var isDeleting = false;
    var paused = false;
    var CHAR_SPEED   = 80;
    var DELETE_SPEED = 40;
    var PAUSE_MS     = 2200;

    function tick() {
      if (paused) return;
      var phrase = phrases[phraseIdx];
      if (!isDeleting) {
        charIdx++;
        el.textContent = phrase.substring(0, charIdx);
        if (charIdx === phrase.length) {
          paused = true;
          setTimeout(function() {
            paused = false;
            isDeleting = true;
            setTimeout(tick, DELETE_SPEED);
          }, PAUSE_MS);
          return;
        }
        setTimeout(tick, CHAR_SPEED);
      } else {
        charIdx--;
        el.textContent = phrase.substring(0, charIdx);
        if (charIdx === 0) {
          isDeleting = false;
          phraseIdx = (phraseIdx + 1) % phrases.length;
          setTimeout(tick, CHAR_SPEED + 100);
          return;
        }
        setTimeout(tick, DELETE_SPEED);
      }
    }

    setTimeout(tick, 600);
  })();


  /* =========================================================
     MODAL HELPERS
  ========================================================= */
  function _showError(id, msg) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
  }
  function _hideError(id) {
    var el = document.getElementById(id);
    el.textContent = '';
    el.classList.remove('show');
  }
  function _showSuccess(id, msg) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
  }
  function _hideSuccess(id) {
    var el = document.getElementById(id);
    el.textContent = '';
    el.classList.remove('show');
  }
  function _setLoading(btnId, loading, defaultText) {
    var btn = document.getElementById(btnId);
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = defaultText + '<span class="spinner"></span>';
    } else {
      btn.disabled = false;
      btn.innerHTML = defaultText;
    }
  }


  /* =========================================================
     LOGIN MODAL
  ========================================================= */
  function openLoginModal() {
    document.getElementById('loginModal').classList.add('open');
    document.getElementById('loginSection').style.display = '';
    document.getElementById('changePwSection').style.display = 'none';
    _hideError('loginError');
    _hideSuccess('loginSuccess');
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    setTimeout(function() {
      document.getElementById('loginUsername').focus();
    }, 100);
  }

  function closeLoginModal() {
    document.getElementById('loginModal').classList.remove('open');
  }

  async function doLogin(e) {
    e.preventDefault();
    _hideError('loginError');
    _hideSuccess('loginSuccess');

    var username = document.getElementById('loginUsername').value.trim();
    var password = document.getElementById('loginPassword').value;

    if (!username || !password) {
      _showError('loginError', 'Please enter username and password.');
      return;
    }

    _setLoading('loginSubmitBtn', true, 'Logging in...');
    try {
      var res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      });
      var data = await res.json();

      if (res.ok && data.ok) {
        if (data.must_change_password) {
          document.getElementById('changePwUsername').value = username;
          document.getElementById('loginSection').style.display = 'none';
          document.getElementById('changePwSection').style.display = '';
        } else {
          _showSuccess('loginSuccess', 'Login successful, redirecting...');
          setTimeout(function() {
            window.location.href = '/dashboard.html';
          }, 900);
        }
      } else {
        _showError('loginError', data.error || 'Invalid username or password.');
      }
    } catch (err) {
      _showError('loginError', 'שגיאת תקשורת. נסה שוב.');
    } finally {
      _setLoading('loginSubmitBtn', false, 'Login');
    }
  }

  async function doChangePassword(e) {
    e.preventDefault();
    _hideError('changePwError');
    _hideSuccess('changePwSuccess');

    var username = document.getElementById('changePwUsername').value;
    var newPw    = document.getElementById('changePwNew').value;
    var confirm  = document.getElementById('changePwConfirm').value;

    if (newPw.length < 8) {
      _showError('changePwError', 'הסיסמה חייבת להכיל לפחות 8 תווים.');
      return;
    }
    if (newPw !== confirm) {
      _showError('changePwError', 'הסיסמאות אינן תואמות.');
      return;
    }

    _setLoading('changePwSubmitBtn', true, 'שמור סיסמה');
    try {
      var token = localStorage.getItem('_tempToken') || '';
      var res = await fetch('/api/auth/change-password', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ username: username, newPassword: newPw })
      });
      var data = await res.json();

      if (res.ok) {
        localStorage.removeItem('_tempToken');
        if (data.token) localStorage.setItem('token', data.token);
        _showSuccess('changePwSuccess', 'הסיסמה עודכנה בהצלחה, מעביר...');
        setTimeout(function() {
          window.location.href = data.redirect || '/dashboard.html';
        }, 1200);
      } else {
        _showError('changePwError', data.message || 'שגיאה בעדכון הסיסמה.');
      }
    } catch (err) {
      _showError('changePwError', 'שגיאת תקשורת. נסה שוב.');
    } finally {
      _setLoading('changePwSubmitBtn', false, 'שמור סיסמה');
    }
  }


  /* =========================================================
     REQUEST ACCESS MODAL
  ========================================================= */
  function openRequestModal() {
    document.getElementById('requestModal').classList.add('open');
    document.getElementById('requestForm').reset();
    _hideError('requestError');
    _hideSuccess('requestSuccess');
    setTimeout(function() {
      document.getElementById('reqName').focus();
    }, 100);
  }

  function closeRequestModal() {
    document.getElementById('requestModal').classList.remove('open');
  }

  async function submitRequest(e) {
    e.preventDefault();
    _hideError('requestError');
    _hideSuccess('requestSuccess');

    var name     = document.getElementById('reqName').value.trim();
    var email    = document.getElementById('reqEmail').value.trim();
    var phone    = document.getElementById('reqPhone').value.trim();
    var division = document.getElementById('reqDivision').value.trim();
    var reason   = document.getElementById('reqReason').value.trim();

    if (!name || !email || !division) {
      _showError('requestError', 'נא למלא שם מלא, אימייל ומחלקה.');
      return;
    }
    var emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRx.test(email)) {
      _showError('requestError', 'כתובת האימייל אינה תקינה.');
      return;
    }

    _setLoading('requestSubmitBtn', true, 'שלח בקשה');
    try {
      var res = await fetch('/api/user-requests', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, email: email, phone: phone, division: division, reason: reason })
      });
      var data = await res.json();

      if (res.ok) {
        _showSuccess('requestSuccess', 'הבקשה נשלחה בהצלחה! נחזור אליך בקרוב.');
        document.getElementById('requestForm').reset();
        setTimeout(closeRequestModal, 2800);
      } else {
        _showError('requestError', data.message || 'שגיאה בשליחת הבקשה.');
      }
    } catch (err) {
      _showError('requestError', 'שגיאת תקשורת. נסה שוב.');
    } finally {
      _setLoading('requestSubmitBtn', false, 'שלח בקשה');
    }
  }


  /* =========================================================
     TOGGLE PASSWORD VISIBILITY
  ========================================================= */
  function togglePwLogin(inputId, btn) {
    var input = document.getElementById(inputId);
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁';
    }
  }


  /* =========================================================
     CLOSE MODALS ON OVERLAY CLICK / ESCAPE
  ========================================================= */
  document.getElementById('loginModal').addEventListener('click', function(e) {
    if (e.target === this) closeLoginModal();
  });
  document.getElementById('requestModal').addEventListener('click', function(e) {
    if (e.target === this) closeRequestModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeLoginModal();
      closeRequestModal();
    }
  });
</script>
</body>
</html>
