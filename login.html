<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>כניסה — אפקון</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#0F4C5C 0%,#0D9488 100%);
    font-family:'Segoe UI',system-ui,Arial,sans-serif;
  }
  .card{
    background:#fff;border-radius:16px;padding:40px 36px;
    width:380px;box-shadow:0 20px 60px rgba(0,0,0,.35);
  }
  .logo{display:flex;align-items:center;justify-content:center;margin-bottom:28px;gap:12px}
  .logo img{height:48px}
  .logo-text{font-size:1.3rem;font-weight:700;color:#0F4C5C;letter-spacing:-.5px}
  h1{font-size:1.05rem;font-weight:600;color:#374151;text-align:center;margin-bottom:24px}
  label{display:block;font-size:.82rem;font-weight:600;color:#4b5563;margin-bottom:5px}
  input{
    width:100%;padding:11px 14px;border:1.5px solid #d1d5db;border-radius:8px;
    font-size:.93rem;outline:none;transition:border-color .2s;direction:ltr;text-align:left;
  }
  input:focus{border-color:#0D9488;box-shadow:0 0 0 3px rgba(13,148,136,.12)}
  .field{margin-bottom:18px}
  .btn{
    width:100%;padding:12px;background:#0F766E;color:#fff;border:none;border-radius:8px;
    font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s;margin-top:4px;
  }
  .btn:hover{background:#0D9488}
  .btn:disabled{background:#5EEAD4;cursor:not-allowed;color:#0F4C5C}
  .err{
    display:none;background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;
    border-radius:8px;padding:10px 14px;font-size:.83rem;margin-top:14px;text-align:center;
  }
  .err.show{display:block}
  .hint{
    background:#F0FDFA;border:1px solid #5EEAD4;color:#0F4C5C;
    border-radius:8px;padding:10px 14px;font-size:.78rem;margin-bottom:18px;line-height:1.6;
  }
  .step{display:none}
  .step.active{display:block}
  .change-title{font-size:1rem;font-weight:700;color:#b45309;text-align:center;margin-bottom:8px}
  .change-sub{
    font-size:.8rem;color:#92400e;text-align:center;margin-bottom:18px;
    background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;
  }
  .back-link{display:block;text-align:center;margin-top:18px;font-size:.82rem;color:#6b7280;text-decoration:none}
  .back-link:hover{color:#0D9488}

  /* Password visibility toggle */
  .pw-wrap{position:relative}
  .pw-wrap input{padding-left:40px}
  .pw-toggle{
    position:absolute;top:50%;left:11px;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;padding:4px;color:#9ca3af;
    line-height:1;transition:color .2s;outline:none;
  }
  .pw-toggle:hover{color:#0D9488}
  .pw-toggle svg{width:18px;height:18px;display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/logo.png" alt="אפקון" onerror="this.style.display='none'">
    <span class="logo-text">אפקון</span>
  </div>

  <!-- Step 1: Login -->
  <div id="step-login" class="step active">
    <h1>כניסה למערכת</h1>
    <form id="form" onsubmit="doLogin(event)">
      <div class="field">
        <label for="u">שם משתמש</label>
        <input id="u" name="username" type="text" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="p">סיסמה</label>
        <div class="pw-wrap">
          <input id="p" name="password" type="password" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('p')" tabindex="-1" aria-label="הצג סיסמה">
            <svg id="eye-p" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-off-p" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <button class="btn" type="submit" id="btn">כניסה</button>
      <div class="err" id="err"></div>
    </form>
  </div>

  <!-- Step 2: Forced password change -->
  <div id="step-change" class="step">
    <p class="change-title">🔒 נדרש שינוי סיסמה</p>
    <p class="change-sub">עליך להגדיר סיסמה חדשה לפני הכניסה למערכת</p>
    <div class="hint">
      דרישות סיסמה:<br>
      ✓ לפחות 8 תווים &nbsp;·&nbsp; ✓ אות גדולה באנגלית<br>
      ✓ אות קטנה באנגלית &nbsp;·&nbsp; ✓ ספרה אחת לפחות
    </div>
    <form id="change-form" onsubmit="doChangePassword(event)">
      <div class="field">
        <label for="cp-new">סיסמה חדשה</label>
        <div class="pw-wrap">
          <input id="cp-new" type="password" autocomplete="new-password" required placeholder="לפחות 8 תווים...">
          <button type="button" class="pw-toggle" onclick="togglePw('cp-new')" tabindex="-1" aria-label="הצג סיסמה">
            <svg id="eye-cp-new" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-off-cp-new" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label for="cp-confirm">אישור סיסמה חדשה</label>
        <div class="pw-wrap">
          <input id="cp-confirm" type="password" autocomplete="new-password" required placeholder="חזור על הסיסמה החדשה">
          <button type="button" class="pw-toggle" onclick="togglePw('cp-confirm')" tabindex="-1" aria-label="הצג סיסמה">
            <svg id="eye-cp-confirm" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-off-cp-confirm" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <button class="btn" type="submit" id="cp-btn">שנה סיסמה וכנס</button>
      <div class="err" id="cp-err"></div>
    </form>
  </div>
</div>

<a href="/" class="back-link">← חזרה לדף הבית</a>

<script>
function togglePw(id) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  document.getElementById('eye-' + id).style.display     = show ? 'none' : '';
  document.getElementById('eye-off-' + id).style.display = show ? '' : 'none';
}

let _loginPassword = '';

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = 'מתחבר...';
  try {
    const pw = document.getElementById('p').value;
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('u').value.trim(),
        password: pw
      })
    });
    const data = await res.json();
    if (res.ok) {
      if (data.must_change_password) {
        _loginPassword = pw;
        document.getElementById('step-login').classList.remove('active');
        document.getElementById('step-change').classList.add('active');
        setTimeout(() => document.getElementById('cp-new').focus(), 50);
      } else {
        window.location.href = '/dashboard';
      }
    } else {
      err.textContent = data.error || 'שגיאה בכניסה';
      err.classList.add('show');
      btn.disabled = false; btn.textContent = 'כניסה';
    }
  } catch {
    err.textContent = 'שגיאת רשת — נסה שנית';
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'כניסה';
  }
}

async function doChangePassword(e) {
  e.preventDefault();
  const btn    = document.getElementById('cp-btn');
  const err    = document.getElementById('cp-err');
  const newPw  = document.getElementById('cp-new').value;
  const confPw = document.getElementById('cp-confirm').value;
  err.classList.remove('show');

  if (newPw !== confPw) {
    err.textContent = 'הסיסמאות אינן תואמות';
    err.classList.add('show');
    return;
  }

  btn.disabled = true; btn.textContent = 'שומר...';
  try {
    const res = await fetch('/api/auth/change-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ currentPassword: _loginPassword, newPassword: newPw })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/';
    } else {
      err.textContent = data.error || 'שגיאה בשינוי סיסמה';
      err.classList.add('show');
      btn.disabled = false; btn.textContent = 'שנה סיסמה וכנס';
    }
  } catch {
    err.textContent = 'שגיאת רשת — נסה שנית';
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'שנה סיסמה וכנס';
  }
}
</script>
</body>
</html>
